<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幼儿英语磨耳朵播放器</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --border: #d9dfeb;
      --primary: #3366ff;
      --primary-weak: #e8eeff;
      --text: #1d2433;
      --muted: #5d6473;
      --danger: #d14343;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --panel: #151923;
        --border: #293042;
        --primary: #6b8dff;
        --primary-weak: #1f2b4d;
        --text: #eef3ff;
        --muted: #a8b2c7;
        --danger: #ff7f7f;
      }
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .toolbar {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    select,
    button,
    input[type="range"] {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 8px 10px;
      min-height: 38px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }

    button.ghost {
      background: var(--primary-weak);
      border-color: transparent;
      color: var(--primary);
      font-weight: 600;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .items {
      max-height: 58vh;
      min-height: 260px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .item-row {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px dashed var(--border);
    }

    .item-row:last-child {
      border-bottom: none;
    }

    .item-row.active {
      background: var(--primary-weak);
    }

    .item-title {
      margin: 0;
      font-size: 13px;
    }

    .item-text {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .unit-section-title {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .unit-section-title.active {
      color: var(--primary);
      background: var(--primary-weak);
    }

    .item-thumb {
      width: 88px;
      height: 56px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .item-thumb.audio {
      background: var(--primary-weak);
      color: var(--primary);
      border-color: var(--primary);
    }

    .item-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .player-bar {
      display: grid;
      gap: 10px;
    }

    .player-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 8px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    .status.error {
      color: var(--danger);
    }

    .now-playing {
      font-weight: 600;
      font-size: 13px;
    }

    .time-row {
      display: grid;
      grid-template-columns: 60px 1fr 60px;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    #videoEl {
      width: 100%;
      max-height: 360px;
      border-radius: 10px;
      background: #000;
      display: none;
    }

    #audioEl {
      width: 100%;
      display: none;
    }

    .footer-tip {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .player-buttons {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }

    @media (max-width: 900px) {
      .container {
        padding: 12px;
        gap: 10px;
      }

      .panel {
        padding: 10px;
      }

      .toolbar {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
      }

      .units,
      .items {
        max-height: 36vh;
        min-height: 160px;
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 10px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .item-row {
        grid-template-columns: 72px 1fr auto;
        gap: 6px;
        padding: 8px 10px;
      }

      .item-thumb {
        width: 72px;
        height: 48px;
        font-size: 12px;
      }

      .item-title {
        font-size: 12px;
      }

      .item-text {
        font-size: 11px;
      }

      .now-playing {
        font-size: 12px;
      }

      .player-buttons {
        grid-template-columns: repeat(2, minmax(100px, 1fr));
      }

      .time-row {
        grid-template-columns: 46px 1fr 46px;
        font-size: 12px;
        gap: 6px;
      }

      select,
      button,
      input[type="range"] {
        min-height: 40px;
      }

      #videoEl {
        max-height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel toolbar">
      <div class="field">
        <label for="modeSelect">播放模式</label>
        <select id="modeSelect">
          <option value="global" selected>全局播放</option>
          <option value="unit">单元播放</option>
        </select>
      </div>
      <div class="field">
        <label for="catalogSelect">资源清单</label>
        <select id="catalogSelect"></select>
      </div>
      <div class="field">
        <label for="shuffleCheckbox">全局随机</label>
        <button id="shuffleCheckbox" class="ghost" type="button" aria-pressed="false">关闭</button>
      </div>
      <div class="field">
        <label>最近进度</label>
        <button id="resumeBtn" type="button">恢复上次播放</button>
      </div>
    </div>

    <div class="panel player-bar">
      <div id="nowPlaying" class="now-playing">未开始播放</div>
      <div class="player-buttons">
        <button id="prevBtn" type="button">上一条</button>
        <button id="playPauseBtn" class="primary" type="button">播放</button>
        <button id="nextBtn" type="button">下一条</button>
        <button id="restartBtn" type="button">重播当前</button>
      </div>

      <div class="time-row">
        <span id="currentTime">00:00</span>
        <input id="seekBar" type="range" min="0" max="1000" value="0" step="1">
        <span id="duration">00:00</span>
      </div>

      <video id="videoEl" preload="none"></video>
      <audio id="audioEl" preload="none"></audio>
      <div id="statusText" class="status"></div>
      <div class="footer-tip">提示：首次播放需手动点击“播放”按钮以解锁浏览器音频权限。</div>
    </div>

    <div class="layout">
      <div class="panel">
        <h3> 播放列表 </h3>
        <div id="itemList" class="items"></div>
      </div>
    </div>
  </div>

  <script src="./manifests/catalog-2a.js"></script>
  <script src="./player.js"></script>
</body>
</html>
